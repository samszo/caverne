async function fetchFunnyStories() {
    try {
        const response = await fetch('http://localhost:11434/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'mistral',
                prompt: 'Generate a single funny short story in French. Format json : {title: ..., text: ...}',
                stream: false
            })
        });
        const data = await response.json();
        return JSON.parse(data.response);
    } catch (error) {
        console.error('Error fetching stories:', error);
    }
}

const funnyStories = [
    { title: "Le Chat Maladroit", text: "Un chat essaie de sauter sur une chaise et rate complètement!" },
    { title: "La Blague du Programmeur", text: "Pourquoi les programmeurs préfèrent le dark mode? Parce que la lumière attire les bugs!" },
    { title: "Le Chien Confus", text: "Un chien voit son reflet dans un miroir et essaie de le combattre." },
    { title: "La Panne", text: "Un homme entre dans un magasin: 'Avez-vous des cordes?' 'Non.' 'Vous n'avez pas de cordes? Vous auriez pu m'appeler!'" }
];

const storyWords = ["Dragon", "Princesse", "Château", "Magie", "Aventure", "Forêt", "Trésor", "Mystère"];

async function changeInp(e){
    let inputs = document.querySelectorAll('.txtInp'),
        //story = funnyStories[Math.floor(Math.random() * funnyStories.length)]; 
        story = await fetchFunnyStories();
    inputs.forEach(input => {
        if(input.tagName === 'INPUT'){
            input.value = story.title;
        }else{
            input.innerHTML = story.text;
        }
    });
}
